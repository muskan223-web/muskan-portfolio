# Workflow to build and deploy Next.js site to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Triggers when you push to main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies 🔧
        run: npm install --legacy-peer-deps

      - name: Build Next.js Site 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js static export folder name
          branch: gh-pages # Target branch for GitHub Pages
